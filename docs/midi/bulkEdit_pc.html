<h3>ポート/チャンネル</h3>
<ul>
    <li>
        対象トラックのポートとチャンネルを、一括で指定された値に変更します。
    </li>
    <li>
        ポートとチャンネルそれぞれについて、<b>チェックした上で<br>
        テキストボックスに適正値を入力した場合</b>にのみ変更されます。
        <ul>
            <li>
                ポート: <span class="script">0</span>(指定解除)または<span class="script">1-16</span>
            </li>
            <li>
                チャンネル: <span class="script">1-16</span>
            </li>
        </ul>
    </li>
</ul>
